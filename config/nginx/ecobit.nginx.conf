server {
    listen 80;
    listen 443 ssl;

    server_name ecobit.docker.loc;
    root /var/www/ecobit/public;

    ssl_certificate /etc/ssl/_wildcard.docker.loc.pem;
    ssl_certificate_key /etc/ssl/_wildcard.docker.loc-key.pem;

    location / {
        try_files $uri @rewriteapp;
    }

    location @rewriteapp {
        rewrite ^(.*)$ /index.php/$1 last;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app_units;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS off;
    }

    error_log /var/log/ecobit.error.log;
    access_log /var/log/ecobit.access.log;
}
